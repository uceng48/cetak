name: Build Electron Windows Portable

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build Windows Application
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24 # 1. Diperbarui ke Node 24 sesuai rekomendasi sistem GitHub Actions terbaru
          # 2. Baris cache: 'npm' dihapus agar tidak terjadi error jika package-lock.json belum di-commit

      - name: Install Dependencies
        run: npm install

      - name: Build Windows Executable
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ThinkFlowResi-Portable
          path: dist/*.exe
          if-no-files-found: error
